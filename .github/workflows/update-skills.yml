name: Update Skills & Plugins Data

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday 6am UTC
  workflow_dispatch: {} # Manual trigger

concurrency:
  group: update-skills
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Run skills scraper
        run: npx tsx scripts/scrape-skills.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run plugins scraper
        run: npx tsx scripts/scrape-plugins.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git diff --quiet data/ && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/skills.json data/plugins.json
          git commit -m "chore: weekly skills & plugins data update"
          git push
